<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found | ParkTech</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/features.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { background: var(--navy); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .error-page {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 2rem; text-align: center; position: relative;
    }
    /* Animated road */
    .road {
      position: absolute; bottom: 0; left: 0; right: 0; height: 120px;
      background: #1a1a2e;
      border-top: 4px solid rgba(240,165,0,0.3);
    }
    .road-line {
      position: absolute; top: 50%; left: -100%;
      width: 80px; height: 6px; background: rgba(240,165,0,0.4);
      border-radius: 3px; animation: roadMove 2s linear infinite;
    }
    .road-line:nth-child(2) { animation-delay: 0.5s; }
    .road-line:nth-child(3) { animation-delay: 1s; }
    .road-line:nth-child(4) { animation-delay: 1.5s; }
    @keyframes roadMove { from{left:-100px} to{left:110%} }

    /* Animated car */
    .car-404 {
      font-size: 4rem; position: absolute;
      bottom: 30px; animation: carDrive 4s ease-in-out infinite;
    }
    @keyframes carDrive {
      0%{left:-100px;opacity:0}
      10%{opacity:1}
      80%{opacity:1}
      100%{left:110%;opacity:0}
    }

    /* Grid background */
    .grid-bg {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(240,165,0,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(240,165,0,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .glow {
      position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(240,165,0,0.06), transparent 70%);
      pointer-events: none;
    }

    .error-content { position: relative; z-index: 1; }
    .error-number {
      font-family: 'Syne', sans-serif;
      font-size: clamp(8rem, 20vw, 14rem);
      font-weight: 800; line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px rgba(240,165,0,0.4);
      position: relative;
      animation: pulse404 3s ease-in-out infinite;
    }
    .error-number::after {
      content: '404';
      position: absolute; inset: 0;
      color: rgba(240,165,0,0.08);
      -webkit-text-stroke: 0;
    }
    @keyframes pulse404 {
      0%,100%{-webkit-text-stroke-color:rgba(240,165,0,0.4)}
      50%{-webkit-text-stroke-color:rgba(240,165,0,0.8)}
    }
    .parking-sign {
      display: inline-flex; align-items: center; justify-content: center;
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(240,165,0,0.1); border: 3px solid var(--gold);
      font-family: 'Syne',sans-serif; font-size: 2.5rem; font-weight: 800;
      color: var(--gold); margin-bottom: 1.5rem;
      animation: spin 8s linear infinite;
    }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .error-title {
      font-family: 'Syne',sans-serif; font-size: clamp(1.5rem,4vw,2.5rem);
      color: var(--white); margin-bottom: 1rem;
    }
    .error-subtitle {
      color: rgba(255,255,255,0.5); font-size: 1.05rem;
      margin-bottom: 2.5rem; max-width: 400px; margin-left: auto; margin-right: auto;
    }
    .error-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .search-bar {
      display: flex; gap: 0; margin: 2rem auto;
      max-width: 400px; border-radius: var(--radius);
      overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
    }
    .search-bar input {
      flex: 1; padding: 0.85rem 1.2rem;
      background: rgba(255,255,255,0.06);
      border: none; color: var(--white); font-family: 'DM Sans',sans-serif;
      outline: none;
    }
    .search-bar input::placeholder { color: rgba(255,255,255,0.3); }
    .search-bar button {
      padding: 0.85rem 1.2rem; background: var(--gold);
      border: none; cursor: pointer; color: var(--navy); font-size: 1rem;
    }
    .quick-links {
      display: flex; gap: 0.75rem; justify-content: center;
      flex-wrap: wrap; margin-top: 2rem;
    }
    .quick-link {
      padding: 0.5rem 1.2rem; border-radius: 50px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6); font-size: 0.85rem;
      transition: all 0.3s ease;
    }
    .quick-link:hover { background: rgba(240,165,0,0.1); border-color: var(--gold); color: var(--gold); }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="nav-logo">Park<span>Tech</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="booking.html">Book Now</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <div class="hamburger"><span></span><span></span><span></span></div>
</nav>
<nav class="mobile-nav">
  <a href="index.html">Home</a><a href="booking.html">Book Now</a><a href="contact.html">Contact</a>
</nav>

<div class="error-page">
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="error-content">
    <div class="parking-sign">P</div>
    <div class="error-number">404</div>
    <h1 class="error-title">Slot Not Found!</h1>
    <p class="error-subtitle">Looks like this parking spot doesn't exist. Maybe it was booked, moved, or never existed.</p>
    <div class="search-bar">
      <input type="text" placeholder="Search for a page..." id="searchInput"/>
      <button onclick="searchPage()"><i class="fas fa-search"></i></button>
    </div>
    <div class="error-btns">
      <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
      <a href="booking.html" class="btn btn-outline">Book a Slot <i class="fas fa-car"></i></a>
    </div>
    <div class="quick-links">
      <a href="services.html" class="quick-link">Services</a>
      <a href="about.html" class="quick-link">About Us</a>
      <a href="pricing.html" class="quick-link">Pricing</a>
      <a href="contact.html" class="quick-link">Contact</a>
      <a href="dashboard.html" class="quick-link">Dashboard</a>
    </div>
  </div>
  <div class="road">
    <div class="road-line"></div>
    <div class="road-line"></div>
    <div class="road-line"></div>
    <div class="road-line"></div>
  </div>
  <div class="car-404">🚗</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/features.js"></script>
<script>
  function searchPage() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const pages = { home:'index.html', booking:'booking.html', about:'about.html', contact:'contact.html', services:'services.html', pricing:'pricing.html', login:'login.html', dashboard:'dashboard.html', review:'review.html' };
    for (let key in pages) {
      if (q.includes(key)) { window.location.href = pages[key]; return; }
    }
    alert('Page not found. Try: home, booking, about, contact');
  }
  document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') searchPage(); });
</script>
</body>
</html>
