<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — ParkTech Solutions</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/features.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body { background: var(--navy); min-height: 100vh; display: flex; flex-direction: column; }
    .auth-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 6rem 1.5rem 3rem; position: relative; overflow: hidden; }
    .auth-page::before { content: ''; position: absolute; top: -30%; right: -20%; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(240,165,0,0.06), transparent 70%); }
    .auth-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-lg); padding: 3rem; width: 100%; max-width: 500px; backdrop-filter: blur(10px); position: relative; z-index: 1; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .auth-logo { text-align: center; margin-bottom: 2rem; }
    .auth-logo .nav-logo { font-size: 1.8rem; }
    .auth-title { font-family: 'Syne',sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--white); text-align: center; margin-bottom: 0.5rem; }
    .auth-sub { text-align: center; color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 2rem; }
    .form-label { color: rgba(255,255,255,0.7); font-size: 0.88rem; display: block; margin-bottom: 0.4rem; font-weight: 500; }
    .auth-input { width: 100%; padding: 0.9rem 1.2rem 0.9rem 3rem; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius); color: var(--white); font-size: 0.95rem; font-family: 'DM Sans', sans-serif; outline: none; transition: var(--transition); }
    .auth-input::placeholder { color: rgba(255,255,255,0.25); }
    .auth-input:focus { border-color: var(--gold); background: rgba(240,165,0,0.05); box-shadow: 0 0 0 3px rgba(240,165,0,0.08); }
    .input-wrap { position: relative; }
    .input-wrap i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); font-size: 0.9rem; }
    .auth-btn { width: 100%; padding: 1rem; background: var(--gold); color: var(--navy); font-family: 'Syne',sans-serif; font-weight: 800; font-size: 1rem; border: none; border-radius: var(--radius); cursor: pointer; transition: var(--transition); margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .auth-btn:hover { background: var(--gold-light); transform: translateY(-2px); }
    .auth-switch { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: rgba(255,255,255,0.4); }
    .auth-switch a { color: var(--gold); font-weight: 600; }
    .form-row-auth { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-grp { margin-bottom: 1rem; }
    .strength-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 0.5rem; overflow: hidden; }
    .strength-fill { height: 100%; width: 0; border-radius: 2px; transition: all 0.3s; }
    .strength-text { font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-top: 0.25rem; }
    @media(max-width:480px) { .form-row-auth { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div id="loader"><div class="loader-inner"><div class="loader-logo">smart<span>city</span></div><div class="loader-bar"></div></div></div>
<nav class="navbar">
  <a href="index.html" class="nav-logo">smart<span>city</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li><li><a href="services.html">Services</a></li><li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li>
    <li><a href="login.html">Login</a></li><li><a href="booking.html" class="nav-cta">Book Now</a></li>
  </ul>
  <div class="hamburger"><span></span><span></span><span></span></div>
</nav>
<nav class="mobile-nav"><a href="index.html">Home</a><a href="services.html">Services</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="login.html">Login</a><a href="booking.html" class="m-cta">Book Now →</a></nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><div class="nav-logo">Park<span>Tech</span></div></div>
    <div class="auth-title">Create Account</div>
    <div class="auth-sub">Join 15,000+ smart parkers across India</div>
    <form onsubmit="handleRegister(event)">
      <div class="form-row-auth">
        <div class="form-grp"><label class="form-label">First Name</label><div class="input-wrap"><i class="fas fa-user"></i><input type="text" class="auth-input" placeholder="pratik" required/></div></div>
        <div class="form-grp"><label class="form-label">Last Name</label><div class="input-wrap"><i class="fas fa-user"></i><input type="text" class="auth-input" placeholder="deshmukh" required/></div></div>
      </div>
      <div class="form-grp"><label class="form-label">Email Address</label><div class="input-wrap"><i class="fas fa-envelope"></i><input type="email" class="auth-input" placeholder="pratik@example.com" required/></div></div>
      <div class="form-grp"><label class="form-label">Mobile Number</label><div class="input-wrap"><i class="fas fa-phone"></i><input type="tel" class="auth-input" id="regMobile" placeholder="+91 98765 43210" required/></div></div>
      <div class="form-grp"><label class="form-label">Vehicle Number</label><div class="input-wrap"><i class="fas fa-car"></i><input type="text" class="auth-input" placeholder="MH12AB1234" required/></div></div>
      <div class="form-grp">
        <label class="form-label">Password</label>
        <div class="input-wrap"><i class="fas fa-lock"></i><input type="password" class="auth-input" id="regPass" placeholder="Min. 8 characters" oninput="checkStrength(this.value)" required/></div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-text" id="strengthText">Enter a password</div>
      </div>
      <div class="form-grp" style="display:flex;align-items:flex-start;gap:0.75rem">
        <input type="checkbox" id="agree" style="width:16px;height:16px;margin-top:2px;accent-color:var(--gold)" required/>
        <label for="agree" style="font-size:0.85rem;color:rgba(255,255,255,0.5)">I agree to ParkTech's <a href="#" style="color:var(--gold)">Terms of Service</a> and <a href="#" style="color:var(--gold)">Privacy Policy</a></label>
      </div>
      <button type="submit" class="auth-btn"><i class="fas fa-user-plus"></i> Create Account</button>
    </form>
    <div class="auth-switch">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/features.js"></script>
<script>
  function checkStrength(val) {
    const fill = document.getElementById('strengthFill');
    const text = document.getElementById('strengthText');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
    const labels = ['Weak','Fair','Good','Strong'];
    fill.style.width = (score * 25) + '%';
    fill.style.background = colors[score-1] || '#ef4444';
    text.textContent = score > 0 ? labels[score-1] : 'Enter a password';
    text.style.color = colors[score-1] || 'rgba(255,255,255,0.3)';
  }
  function handleRegister(e) {
    e.preventDefault();
    const mobile = document.getElementById('regMobile').value.replace(/\s/g,'');
    if (!/^\+?[\d]{10,13}$/.test(mobile)) { alert('⚠️ Enter a valid mobile number.'); return; }
    alert('✅ Account created! Please check your email to verify.');
    window.location.href = 'login.html';
  }
</script>
</body>
</html>
